spring.application.name=orbitalert

# Oracle ? lÍ vari·veis de ambiente no Render, usa valores fixos como fallback local
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:oracle:thin:@oracle.fiap.com.br:1521:ORCL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:rm563719}
